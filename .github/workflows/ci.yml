name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate candidate pools
        run: |
          python3 aha-skills-finder/scripts/validate-candidate-pool.py \
            aha-skills-finder/examples/find-skill-finder/candidate-pool.json \
            aha-skills-finder/examples/find-skill-audit/candidate-pool.json \
            aha-skills-finder/examples/find-skill-multi-lane/candidate-pool.json

      - name: Validate skill frontmatter
        run: python3 aha-skills-finder/scripts/validate-skill.py aha-skills-finder

      - name: Validate schema compatibility
        run: python3 aha-skills-finder/scripts/validate-schema-compat.py .

      - name: npm test
        run: npm test

      - name: Package dry run
        run: npm pack --dry-run
