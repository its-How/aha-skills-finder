version: "0.1"
purpose: "Source-family checklist for find-stage skill and capability discovery. Choose sources by target lane ecosystem; this is not a universal mandatory checklist."
source_families:
  - id: "skill-registries-search-indexes"
    label: "Skill registries and search indexes"
    examples:
      - "skills.sh"
      - "ClawHub / OpenClaw"
      - "ClawHub public search API"
      - "OpenClaw registry skill/version endpoints"
      - "SkillsMP"
      - "Skills Rank"
      - "Skillhound"
      - "Skillsgate"
      - "SkillX"
    useful_for:
      - "install counts"
      - "downloads, current installs, all-time installs, stars, slugs, and version metadata"
      - "registry-native skills that do not have standalone repos or packages"
      - "version file lists, file hashes, and registry-provided scan labels as raw signals"
      - "trending and first-seen signals"
      - "cross-ecosystem recall"
    not_for:
      - "safety conclusions"
      - "source quality conclusions"
      - "adoption recommendations"
  - id: "registry-public-apis-search-endpoints"
    label: "Registry public APIs and search endpoints"
    examples:
      - "marketplace search endpoint"
      - "registry public search endpoint"
      - "registry install or usage telemetry endpoint"
      - "registry skill detail endpoint"
      - "registry version/detail endpoint"
      - "registry version/files endpoint"
      - "registry files/hash endpoint"
      - "registry slug lookup"
      - "registry slug lookup endpoint"
    useful_for:
      - "registry-native candidate confirmation after repo/package misses"
      - "cross-map registry entries to repo/package/subpath identities"
      - "machine-readable raw stats"
      - "install, usage, file, and hash telemetry when exposed"
      - "API failure and auth/rate-limit gaps"
      - "exact slug, display name, version, file count, and file-hash availability"
    not_for:
      - "proof that registry security status is sufficient"
      - "treating one registry miss as market absence"
      - "install or enable decisions"
  - id: "runtime-spec-docs"
    label: "Runtime and spec docs"
    examples:
      - "Codex Skills docs"
      - "Claude Code Skills docs"
      - "OpenClaw / Agent Skills spec"
      - "framework official docs"
    useful_for:
      - "candidate shape"
      - "runtime-native capability terms"
    not_for:
      - "market adoption"
  - id: "source-repositories"
    label: "Source repositories"
    examples:
      - "GitHub repo search"
      - "GitHub code search for SKILL.md"
      - "Gitee"
      - "GitLab"
    useful_for:
      - "stars"
      - "forks"
      - "source traceability"
      - "hidden monorepo skills"
      - "monorepo subpath discovery for specific skills, plugins, adapters, and tools"
      - "repo-level metric caveats when stars, forks, or pushed dates describe a broader repo than the candidate path"
      - "code-search failure classification, such as 401 auth required, rate limit, or query syntax failure"
    not_for:
      - "skill install counts"
      - "proving no registry-native skill exists"
      - "treating monorepo stars as subskill quality proof"
  - id: "package-registries"
    label: "Package registries"
    examples:
      - "npm"
      - "npm search / package detail metadata"
      - "PyPI"
      - "crates.io"
      - "Homebrew"
      - "GitHub Packages"
    useful_for:
      - "CLI, SDK, MCP, and tool maturity signals"
      - "downloads where available"
      - "downloads API results and explicit download windows"
      - "release cadence and package freshness raw signals"
      - "skill libraries, finders, routers, managers, installers, marketplaces, MCP loaders, and retrieval/distillation tools"
      - "package descriptions, keywords, repository URLs, versions, creation dates, update dates, and download windows as raw signals"
      - "repository URL traceability for package-to-repo and repo-to-package cross-map checks"
    not_for:
      - "treating package existence as proof that an equivalent installable skill exists"
      - "proving no marketplace-only skill exists"
      - "safety, quality, or fit proof from downloads or versions"
      - "adoption recommendations"
  - id: "package-registry-skill-tooling"
    label: "Package-registry skill tooling"
    examples:
      - "npm packages matching skill library"
      - "npm packages matching skill finder"
      - "npm packages matching skill router"
      - "npm packages matching skill manager"
      - "npm packages matching skill installer"
      - "npm packages matching skill marketplace"
      - "npm packages matching MCP skill loader"
      - "PyPI packages matching agent skill retrieval"
    useful_for:
      - "discovering adjacent tools that help find, load, route, manage, install, publish, or index skills"
      - "catching package-first candidates that generic web search or curated lists miss"
      - "raw package metadata such as version, description, repository URL, keywords, publish/update dates, and download counts"
      - "query expansion vocabulary for skill-tooling lanes"
    not_for:
      - "treating package existence as adoption recommendation"
      - "installing, enabling, publishing, logging in, or mutating runtime config"
      - "source, safety, permission, maintenance, credential, provider, browser, live, or external-write audit"
  - id: "mcp-agent-tool-catalogs"
    label: "MCP and agent-tool catalogs"
    examples:
      - "MCP Registry"
      - "mcp.directory"
      - "Official MCP Registry"
      - "MCP.so"
      - "Glama MCP Server Directory"
      - "mcpservers.org"
      - "Smithery"
      - "PulseMCP"
      - "awesome-mcp-servers"
      - "vendor tool catalogs"
    useful_for:
      - "adjacent callable capabilities"
      - "tool entrypoints"
      - "server names, package names, transport types, and catalog stats as raw signals"
    not_for:
      - "permission approval"
      - "credential readiness"
      - "runtime enablement"
  - id: "plugin-stores"
    label: "Plugin stores and runtime extension catalogs"
    examples:
      - "Codex plugin marketplace"
      - "Claude Code plugin or skill catalogs"
      - "IDE agent extension catalogs"
      - "runtime-specific plugin indexes"
    useful_for:
      - "agent-native packaging surface"
      - "installs, ratings, version, and publisher metadata when exposed"
      - "runtime-specific naming and capability terms"
    not_for:
      - "global runtime config mutation"
      - "permission or source audit"
  - id: "extension-saas-provider"
    label: "Extension, SaaS, and provider surfaces"
    examples:
      - "Chrome Web Store"
      - "VS Code Marketplace"
      - "Cursor extensions"
      - "JetBrains Marketplace"
      - "SaaS integration catalogs"
      - "official provider APIs"
      - "dashboard action terms"
    useful_for:
      - "real platform action vocabulary"
      - "mature non-skill routes"
      - "extension or SaaS install counts when exposed"
    not_for:
      - "project-local controllability"
      - "live readiness"
      - "credential readiness"
  - id: "saas-provider-native-docs"
    label: "SaaS, provider, and platform-native docs"
    examples:
      - "official API docs"
      - "provider SDK docs"
      - "platform action or integration docs"
      - "native dashboard capability docs"
    useful_for:
      - "native-first baseline"
      - "official action vocabulary"
      - "receipt, artifact, webhook, and permission terms"
    not_for:
      - "provider config changes"
      - "quota, billing, account, or live readiness"
  - id: "native-runtime-capability"
    label: "Native framework and runtime capabilities"
    examples:
      - "built-in runtime tools"
      - "official SDK helpers"
      - "framework-native commands"
    useful_for:
      - "native-first baseline"
      - "avoiding unnecessary wrappers"
    not_for:
      - "third-party ecosystem coverage"
  - id: "leaderboards-telemetry"
    label: "Leaderboards, telemetry, and public usage trackers"
    examples:
      - "skill leaderboards"
      - "marketplace trending pages"
      - "download charts"
      - "public invocation or install trackers"
    useful_for:
      - "raw popularity and freshness signals"
      - "first-seen and trend discovery"
      - "candidate names missed by generic search"
    not_for:
      - "quality conclusions"
      - "adoption ranking"
  - id: "curated-recommended-lists"
    label: "Curated, recommended, and best-of lists"
    examples:
      - "recommended skill lists"
      - "best agent skills roundups"
      - "awesome skill or MCP lists"
      - "Awesome GitHub Copilot"
      - "Awesome Claude Code"
      - "skills.sh Official, Trending, Hot, Topics, and Agents"
      - "ClawHub Featured, Recommended, Publishers, Plugins, and Audits"
      - "newsletter picks"
      - "community rankings"
      - "local-language curated lists"
    useful_for:
      - "cold-start recall"
      - "candidate names missed by generic search"
      - "ecosystem vocabulary and adjacent terms"
      - "cross-checking registry-native and repo/package search"
      - "seeding from source-registries/curated-skill-lists.yaml"
    not_for:
      - "quality conclusions"
      - "safety conclusions"
      - "adoption recommendations"
  - id: "local-global-skill-directories"
    label: "Local and global skill directories"
    examples:
      - "repo-local skills directory"
      - "user-global skills directory"
      - "runtime cache skill directory"
      - "plugin-bundled skill directory"
    useful_for:
      - "already-available local candidates"
      - "skill naming, trigger, and packaging patterns"
      - "offline or private ecosystem recall"
    not_for:
      - "permission to execute local skills"
      - "evidence of public adoption"
  - id: "curated-community-indexes"
    label: "Curated and community indexes"
    examples:
      - "awesome lists"
      - "community playbooks"
      - "tracking repos"
      - "blog directories"
    useful_for:
      - "cold-start recall"
      - "adjacent terms"
      - "recent growth pointers"
    not_for:
      - "final adoption decisions"
