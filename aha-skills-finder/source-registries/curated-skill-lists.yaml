version: "0.1"
name: "Curated and adjacent discovery-source registry"
purpose: "Seed registry of curated skill lists and adjacent discovery sources for find-stage discovery, including skill registries, MCP registries/directories, reference repos, and community indexes. These entries help agents find richer candidate surfaces; they are not endorsements of any skill, server, package, provider, or tool."
boundary:
  does:
    - "seed R1 source-surface recall for skill-list, skill-discovery, MCP-adjacent, and adjacent-index lanes"
    - "record where curated, featured, trending, hot, official, recommended, roundup, registry, directory, reference, or community discovery sources may be found"
    - "expose list-source, registry-source, directory-source, reference-source, and community-source metadata and source gaps as raw discovery signals"
  does_not:
    - "recommend adopting any listed skill"
    - "prove source quality, safety, maintenance, or install readiness"
    - "replace candidate-level source review, permission review, or install gates"
entries:
  - id: "skills-sh-official-curated"
    name: "skills.sh official curated skills"
    source_family: "curated-recommended-lists"
    last_verified: "2026-06-10"
    claim_source: "primary_url, api_or_docs_url, and access_notes"
    status: "active"
    search_api: none
    search_api_note: "Browse-only; no public search API. Discovery requires manual browsing or web-search-based surface recall."
    notes_on_access: "API docs describe the surface; auth may be required, so record access failures as source gaps."
    primary_url: "https://skills.sh/official"
    api_or_docs_url: "https://www.skills.sh/docs/api"
    access_notes:
      - "Docs describe /api/v1/skills/curated as official curated first-party skills."
      - "API access may require Vercel OIDC authentication; record 401/auth gaps instead of treating them as no result."
    useful_for:
      - "first-party or maker-authored skill discovery"
      - "install counts and stable skill ids where accessible"
      - "official-source vocabulary"
    not_for:
      - "safety proof"
      - "adoption recommendation"
      - "unauthenticated availability guarantee"
